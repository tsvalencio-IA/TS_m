<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema CAD Avançado - Web</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script async src="https://docs.opencv.org/4.5.0/opencv.js" type="text/javascript"></script>
</head>
<body>
    <header class="app-header" id="mainHeader">
        <h1><i class="fas fa-cube"></i> <span class="brand">CAD System</span> | Produção & AR</h1>
        <div style="display:flex; gap:10px;">
            <input type="file" id="fotoAmbiente" accept="image/*" style="display:none;">
            <button class="tool-btn" onclick="document.getElementById('fotoAmbiente').click()"><i class="fas fa-camera"></i> Subir Foto Real</button>
            <button class="tool-btn action-btn" onclick="window.App.ui.exportProject()"><i class="fas fa-download"></i> Exportar Projeto</button>
        </div>
    </header>

    <div class="top-tools" id="toolModeContainer">
        <button class="tool-btn active" id="btnOrbit" onclick="window.App.setMode('orbit')"><i class="fas fa-eye"></i> Orbitar</button>
        <button class="tool-btn" id="btnMove" onclick="window.App.setMode('move')"><i class="fas fa-arrows-alt"></i> Mover Móvel</button>
    </div>

    <div id="canvas-container">
        <canvas id="cad-canvas"></canvas>
    </div>

    <div class="bottom-sheet active" id="painelIA">
        <div class="sheet-header">
            <h3><i class="fas fa-robot"></i> Inteligência e Criação</h3>
        </div>
        <div class="sheet-body">
            <textarea id="textoProjeto" placeholder="Ex: Crie um balcão curvo de 2000x1100x500 e um armário aéreo de 1000x600x300..."></textarea>
            <button class="tool-btn action-btn" onclick="window.App.gerarViaTexto()"><i class="fas fa-magic"></i> Gerar Projeto</button>
            <button class="tool-btn success" style="margin-top:10px;" onclick="window.App.gerarProducao()"><i class="fas fa-industry"></i> Gerar Plano de Corte (Nesting)</button>
            <div id="cutPlanResult" style="margin-top: 15px;"></div>
        </div>
    </div>

    <script src="interpreter.js"></script>
    <script src="cv.js"></script>
    <script src="modules.js"></script>
    <script src="app.js"></script>
</body>
</html>
